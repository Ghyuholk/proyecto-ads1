---
- name: Desplegar Garrobito multiinquilino
  hosts: app_hosts
  gather_facts: false
  become: true

  vars:
    app_name: garrobito
    build_number: "manual"
    package_path: "codigo.tar.gz"
    releases_root: /opt/garrobito/releases
    release_dir: "{{ releases_root }}/{{ build_number }}"

    docker_network: garrobito_net
    db_container_name: garrobito_db
    db_root_user: root
    db_root_password: ""
    db_name_prefix: db_
    db_user_prefix: usr_

    client_name: Cliente
    slug: cliente
    app_port: ""

    backend_image: "garrobito-backend:{{ build_number }}"
    frontend_image: "garrobito-frontend:{{ build_number }}"

    admin_username: admin
    admin_password: ""
    deploy_api_key: ""
    jenkins_url: ""
    jenkins_user: ""
    jenkins_api_token: ""
    jenkins_job_name: garrobito-deploy
    jenkins_verify_ssl: "true"

  pre_tasks:
    - name: Validar variables requeridas
      ansible.builtin.assert:
        that:
          - db_root_password | length > 0
          - backend_image | length > 0
          - frontend_image | length > 0
          - admin_password | length > 0
        fail_msg: Faltan variables requeridas. Revisa credenciales de Jenkins y etiquetas de imagen.

    - name: Normalizar identificador del cliente
      ansible.builtin.set_fact:
        tenant_slug: "{{ slug | lower | regex_replace('[^a-z0-9]+', '_') | regex_replace('(^_+|_+$)', '') }}"

    - name: Construir identificadores del cliente
      ansible.builtin.set_fact:
        tenant_db_name: "{{ db_name_prefix }}{{ tenant_slug }}"
        tenant_db_user: "{{ (db_user_prefix ~ tenant_slug)[:16] }}"
        api_container_name: "{{ app_name }}_api_{{ tenant_slug }}"
        web_container_name: "{{ app_name }}_web_{{ tenant_slug }}"

    - name: Seleccionar puerto libre si no se especifica
      ansible.builtin.shell: |
        for p in $(seq 8002 8999); do
          if ! ss -ltn | awk '{print $4}' | grep -q ":$p$"; then
            echo "$p"
            exit 0
          fi
        done
        exit 1
      args:
        executable: /bin/bash
      register: puerto_libre
      when: app_port | string | length == 0

    - name: Definir puerto final
      ansible.builtin.set_fact:
        app_port: "{{ app_port if (app_port | string | length > 0) else (puerto_libre.stdout | trim) }}"

    - name: Generar secretos del cliente
      ansible.builtin.set_fact:
        tenant_db_password: "{{ lookup('ansible.builtin.password', '/tmp/' ~ app_name ~ '_' ~ tenant_slug ~ '_db_password length=30 chars=ascii_letters,digits') }}"
        backend_secret_key: "{{ lookup('ansible.builtin.password', '/tmp/' ~ app_name ~ '_' ~ tenant_slug ~ '_backend_secret length=50 chars=ascii_letters,digits') }}"
        jwt_secret_key: "{{ lookup('ansible.builtin.password', '/tmp/' ~ app_name ~ '_' ~ tenant_slug ~ '_jwt_secret length=50 chars=ascii_letters,digits') }}"
        frontend_secret_key: "{{ lookup('ansible.builtin.password', '/tmp/' ~ app_name ~ '_' ~ tenant_slug ~ '_frontend_secret length=50 chars=ascii_letters,digits') }}"

  tasks:
    - name: Crear directorio de releases
      ansible.builtin.file:
        path: "{{ releases_root }}"
        state: directory
        mode: "0755"

    - name: Crear directorio de release actual
      ansible.builtin.file:
        path: "{{ release_dir }}"
        state: directory
        mode: "0755"

    - name: Subir y descomprimir codigo en EC2
      ansible.builtin.unarchive:
        src: "{{ package_path }}"
        dest: "{{ release_dir }}"
        mode: "0755"

    - name: Asegurar que exista la red compartida de Docker
      community.docker.docker_network:
        name: "{{ docker_network }}"
        state: present

    - name: Construir imagen backend en EC2
      ansible.builtin.shell: docker build -t {{ backend_image }} -f {{ release_dir }}/backend/Dockerfile {{ release_dir }}/backend
      register: build_backend
      retries: 3
      delay: 15
      until: build_backend.rc == 0

    - name: Construir imagen frontend en EC2
      ansible.builtin.shell: docker build -t {{ frontend_image }} -f {{ release_dir }}/frontend/Dockerfile {{ release_dir }}/frontend
      register: build_frontend
      retries: 3
      delay: 15
      until: build_frontend.rc == 0

    - name: Asegurar que existan la base de datos y el usuario del cliente
      community.docker.docker_container_exec:
        container: "{{ db_container_name }}"
        command: >-
          mariadb -u{{ db_root_user }} -p{{ db_root_password }}
          -e "CREATE DATABASE IF NOT EXISTS {{ tenant_db_name }};
          CREATE USER IF NOT EXISTS '{{ tenant_db_user }}'@'%' IDENTIFIED BY '{{ tenant_db_password }}';
          ALTER USER '{{ tenant_db_user }}'@'%' IDENTIFIED BY '{{ tenant_db_password }}';
          GRANT ALL PRIVILEGES ON {{ tenant_db_name }}.* TO '{{ tenant_db_user }}'@'%';
          FLUSH PRIVILEGES;"

    - name: Desplegar contenedor backend
      community.docker.docker_container:
        name: "{{ api_container_name }}"
        image: "{{ backend_image }}"
        restart_policy: unless-stopped
        state: started
        recreate: true
        pull: false
        networks:
          - name: "{{ docker_network }}"
        env:
          FLASK_ENV: production
          FLASK_DEBUG: "0"
          HOST: 0.0.0.0
          PORT: "5000"
          SECRET_KEY: "{{ backend_secret_key }}"
          JWT_SECRET_KEY: "{{ jwt_secret_key }}"
          DATABASE_URL: "mysql+pymysql://{{ tenant_db_user }}:{{ tenant_db_password }}@{{ db_container_name }}:3306/{{ tenant_db_name }}"
          DEPLOY_API_KEY: "{{ deploy_api_key }}"
          JENKINS_URL: "{{ jenkins_url }}"
          JENKINS_USER: "{{ jenkins_user }}"
          JENKINS_API_TOKEN: "{{ jenkins_api_token }}"
          JENKINS_JOB_NAME: "{{ jenkins_job_name }}"
          JENKINS_VERIFY_SSL: "{{ jenkins_verify_ssl }}"

    - name: Ejecutar migraciones del backend
      ansible.builtin.shell: docker exec {{ api_container_name }} flask --app run.py db upgrade
      register: migracion_backend
      retries: 6
      delay: 10
      until: migracion_backend.rc == 0

    - name: Sembrar o actualizar usuario administrador
      ansible.builtin.shell: >-
        docker exec {{ api_container_name }} sh -lc
        "ADMIN_USERNAME='{{ admin_username }}'
        ADMIN_PASSWORD='{{ admin_password }}'
        flask --app run.py seed-admin"
      register: seed_admin_backend
      retries: 4
      delay: 8
      until: seed_admin_backend.rc == 0

    - name: Desplegar contenedor frontend
      community.docker.docker_container:
        name: "{{ web_container_name }}"
        image: "{{ frontend_image }}"
        restart_policy: unless-stopped
        state: started
        recreate: true
        pull: false
        networks:
          - name: "{{ docker_network }}"
        published_ports:
          - "{{ app_port }}:80"
        env:
          BACKEND_API_URL: "http://{{ api_container_name }}:5000"
          FRONTEND_SECRET_KEY: "{{ frontend_secret_key }}"
          BACKEND_DEPLOY_KEY: "{{ deploy_api_key }}"

    - name: Esperar endpoint de salud del frontend
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ app_port }}/health"
        method: GET
        status_code: 200
      register: frontend_health
      retries: 15
      delay: 2
      until: frontend_health.status == 200
